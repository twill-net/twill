name: Docs

on:
  push:
    branches: [main]
    paths:
      - "book/**"
      - "docs/**"
      - "README.md"
      - "JOIN.md"
      - "SECURITY.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          MDBOOK_VERSION=v0.4.40
          mkdir -p ~/.local/bin
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/mdbook-${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C ~/.local/bin
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build book
        working-directory: book
        run: mdbook build

      - name: Copy status page into site root
        run: |
          if [ -f book/src/status.html ]; then
            cp book/src/status.html book/dist/status.html
          fi
          if [ -f site/status.html ]; then
            mkdir -p book/dist/status
            cp site/status.html book/dist/status/index.html
          fi

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/dist

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
