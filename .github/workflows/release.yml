name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev protobuf-compiler

      - name: Build
        run: cargo build --release
        env:
          CARGO_INCREMENTAL: 0

      - name: Package
        run: |
          cp target/release/twill twill-linux-x86_64
          strip twill-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: twill-linux-x86_64
          path: twill-linux-x86_64

  build-macos:
    name: Build (macOS arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install system deps
        run: brew install protobuf

      - name: Build
        run: cargo build --release
        env:
          CARGO_INCREMENTAL: 0

      - name: Package
        run: |
          cp target/release/twill twill-macos-arm64
          strip twill-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: twill-macos-arm64
          path: twill-macos-arm64

  release:
    name: Publish Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            twill-linux-x86_64/twill-linux-x86_64
            twill-macos-arm64/twill-macos-arm64
            chainspec-raw.json
          body: |
            ## Twill Network ${{ github.ref_name }}

            ### Quick Start (miners)
            See [JOIN.md](https://github.com/twill-net/twill/blob/main/JOIN.md) for full setup instructions.

            ### Downloads
            - `twill-linux-x86_64` — Linux x86_64 node binary
            - `twill-macos-arm64` — macOS Apple Silicon node binary
            - `chainspec-raw.json` — Chain specification (required)

            ### Verify
            sha256 checksums:
            ```
            $(sha256sum twill-linux-x86_64/twill-linux-x86_64 twill-macos-arm64/twill-macos-arm64 chainspec-raw.json)
            ```
