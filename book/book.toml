[book]
title = "Twill Network"
description = "A Layer 1 blockchain where 100% of every block reward goes to the miner. Zero founder allocation. No pre-mine. No admin keys."
authors = ["Twill Network"]
language = "en"
multilingual = false
src = "src"

[build]
build-dir = "dist"
create-missing = false

[output.html]
default-theme = "ayu"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/twill-net/twill"
edit-url-template = "https://github.com/twill-net/twill/edit/main/book/src/{path}"
additional-css = ["theme/twill.css"]
smart-punctuation = true
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.print]
enable = true

[output.html.search]
enable = true
limit-results = 20
use-boolean-and = true
boost-title = 2
boost-hierarchy = 2
